name: AarogyaiOS
options:
  bundleIdPrefix: com.kinvee.aarogya
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"

targets:
  AarogyaiOS:
    type: application
    platform: iOS
    sources:
      - path: AarogyaiOS
        excludes:
          - "**/.gitkeep"
    resources:
      - path: AarogyaiOS/Resources
    settings:
      base:
        INFOPLIST_FILE: AarogyaiOS/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kinvee.aarogya.dev
        PRODUCT_NAME: AarogyaiOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: AarogyaiOS/Resources/AarogyaiOS.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          API_BASE_URL: "https://api.dev.kinvee.in"
          COGNITO_REGION: ap-south-1
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          API_BASE_URL: "https://api.kinvee.in"
          COGNITO_REGION: ap-south-1
    dependencies:
      - package: Nuke
    postBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          # Temporarily disabled due to Xcode sandbox issue
          echo "SwiftLint temporarily disabled"
          # if command -v swiftlint >/dev/null 2>&1; then
          #   swiftlint lint --config "$SRCROOT/.swiftlint.yml" --quiet
          # else
          #   echo "warning: SwiftLint not installed. Install with: brew install swiftlint"
          # fi

  AarogyaiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AarogyaiOSTests
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kinvee.aarogya.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: AarogyaiOS

  AarogyaiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AarogyaiOSUITests
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kinvee.aarogya.uitests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: AarogyaiOS

schemes:
  AarogyaiOS-Dev:
    build:
      targets:
        AarogyaiOS: all
        AarogyaiOSTests: [test]
        AarogyaiOSUITests: [test]
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug 1": true
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - AarogyaiOS
      targets:
        - name: AarogyaiOSTests
          parallelizable: true
        - name: AarogyaiOSUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
